name: Main Health

on:
  schedule:
    - cron: '17 7 * * 1'   # 07:17 every Monday (UTC)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    name: Build main
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Open or update tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[main-ci-fail] main branch CI failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Main-branch health check failed.\n\nRun: ${runUrl}\n\nThis issue auto-comments on each subsequent failed run and auto-closes when main builds clean again.`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'main-ci-fail'
            });
            const match = existing.find(i => i.title === title);

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Run failed again: ${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['main-ci-fail', 'automation'],
                body
              });
            }

      - name: Close tracking issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[main-ci-fail] main branch CI failing';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'main-ci-fail'
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                state: 'closed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Auto-closed: main is building cleanly again.`
              });
            }
